<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fecha y Hora</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Icons de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">

        <div class="text-center mb-1">
            <img src="https://placehold.co/300x80/transparent/e0e0e0?text=[Imagen+Navidad]" alt="Regalos"
                class="img-fluid" style="max-height: 80px;">
        </div>
        <div class="card border-0 shadow-sm rounded-4 position-relative z-1">
            <div class="card-body p-4 pb-3">

                <h5 class="card-title fw-bold mb-4 fs-6 text-dark">¿Cuándo se celebra Intercambio 2026?</h5>

                <div class="d-flex flex-column gap-2 mb-4">
                    <button type="button"
                        class="btn-fecha btn border-0 bg-secondary bg-opacity-10 text-primary fw-bold rounded-3 py-2 px-3 text-start fs-6">domingo,
                        22 de febrero de 2026</button>
                    <button type="button"
                        class="btn-fecha btn border-0 bg-secondary bg-opacity-10 text-primary fw-bold rounded-3 py-2 px-3 text-start fs-6">viernes,
                        27 de febrero de 2026</button>
                    <button type="button"
                        class="btn-fecha btn border-0 bg-secondary bg-opacity-10 text-primary fw-bold rounded-3 py-2 px-3 text-start fs-6">sábado,
                        28 de febrero de 2026</button>

                    <button type="button" id="btn-otro"
                        class="btn-fecha btn border border-primary bg-primary bg-opacity-10 text-primary fw-bold rounded-3 py-2 px-3 d-flex justify-content-between align-items-center fs-6">
                        Otro <i class="bi bi-pencil-fill small"></i>
                    </button>
                </div>

                <div id="seccion-calendario" class="mb-4 position-relative">
                    <label class="form-label fw-bold fs-6 text-dark mb-2">Fecha de la celebración</label>

                    <div id="btn-desplegar-calendario"
                        class="form-control border-primary text-secondary d-flex justify-content-between align-items-center py-2 rounded-3"
                        style="cursor: pointer;">
                        <span id="texto-fecha">Escoge la fecha</span>
                        <i class="bi bi-chevron-down"></i>
                    </div>

                    <div id="calendario-popover"
                        class="card shadow-lg border-primary position-absolute w-100 mt-1 z-3 rounded-3 d-none">
                        <div class="card-body p-3">

                            <div class="d-flex justify-content-between align-items-center mb-3 text-secondary">
                                <i class="bi bi-chevron-left fs-6 p-1" role="button" id="btn-prev-mes"></i>
                                <span class="small fw-bold text-dark" id="mes-anio-texto">Febrero, 2026</span>
                                <i class="bi bi-chevron-right fs-6 p-1" role="button" id="btn-next-mes"></i>
                            </div>

                            <div class="row g-0 text-center text-primary fw-bold mb-2 small" style="font-size: 0.8rem;">
                                <div class="col">Lu</div>
                                <div class="col">Ma</div>
                                <div class="col">Mi</div>
                                <div class="col">Ju</div>
                                <div class="col">Vi</div>
                                <div class="col">Sa</div>
                                <div class="col">Do</div>
                            </div>

                            <div id="contenedor-dias" class="text-secondary small" style="font-size: 0.85rem;">
                            </div>
                        </div>
                    </div>
                </div>
                

                <div class="d-flex gap-2 mt-4">
                    <button id="btnRegresar"
                        class="btn border-0 bg-secondary bg-opacity-10 text-primary rounded-3 px-3 d-flex align-items-center justify-content-center">
                        <i class="bi bi-chevron-left fw-bold"></i>
                    </button>
                    <button id="btnContinuar"
                        class="btn btn-primary w-100 d-flex justify-content-between align-items-center py-2 rounded-3">
                        <span class="fw-semibold">Continuar</span>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>

            </div>
        </div>

    </div>

    <script src="../js/fecha.js"></script>
    <script src="../js/main.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
