<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen del Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <!-- Sweetalert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Sweetalert Confetti -->
     <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="d-flex justify-content-center align-items-start min-vh-100 py-4">
    <div class="col-11 col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="text-center mb-1">
            <img src="../assets/img/regalos.png" alt="Regalos" class="img-fluid" style="max-height: 150px;">
        </div>
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <h4 class="fw-bold text-center mb-4">Resumen del Intercambio</h4>
                
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="text-muted small d-block">Evento</label>
                        <span id="res-nombre-evento" class="fw-bold text-primary fs-5">-</span>
                    </div>
                    <div class="col-6 text-end">
                        <label class="text-muted small d-block">Presupuesto</label>
                        <span id="res-presupuesto" class="fw-bold text-success fs-5">-</span>
                    </div>
                    <div class="col-6">
                        <label class="text-muted small d-block">Fecha</label>
                        <span id="res-fecha" class="fw-bold text-dark">-</span>
                    </div>
                    <div class="col-6 text-end">
                        <label class="text-muted small d-block">Organizador/a</label>
                        <span id="res-organizador" class="fw-bold text-dark">-</span>
                    </div>
                </div>

                <hr class="text-muted opacity-25">

                <div class="mb-4">
                    <h6 class="fw-bold mb-3"><i class="bi bi-people-fill me-2"></i>Participantes y Restricciones</h6>
                    <div id="lista-resumen" class="list-group list-group-flush rounded-3 border">
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button id="btnRealizarSorteo" class="btn btn-primary py-3 rounded-3 fw-bold fs-5 shadow-sm">
                        ¡Realizar Sorteo Ahora! <i class="bi bi-magic ms-2"></i>
                    </button>
                    <button id="btnRegresar" class="btn btn-link text-decoration-none text-muted small">
                        Cambiar datos
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/sorteo-logica.js"></script>
    <script src="../js/sorteo-resumen.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
