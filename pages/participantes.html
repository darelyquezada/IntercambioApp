<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">
        <div class="text-center mb-1">
            <img src="" alt="Regalos" class="img-fluid" style="max-height: 80px;">
        </div>
        <div class="card card-elevated border-0 rounded-4 shadow-sm">
            <div class="card-body p-4">
                <h5 class="card-title fw-bold mb-3 fs-6">¿Con quién vas a sortear nombres?</h5>
                <div id="listaParticipantes" class="row g-2 mb-3" style="max-height: 200px; overflow-y: auto;"></div>
                <div class="input-group mb-4">
                    <input type="text" id="nombreInput" class="form-control rounded-3 py-2" placeholder="Nombre...">
                    <button class="btn btn-primary rounded-3 ms-2" id="btnAgregar">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
                <div class="d-flex gap-2">
                    <button id="btnRegresar" class="btn border-0 bg-secondary bg-opacity-10 text-primary rounded-3 px-3 d-flex align-items-center justify-content-center">
                        <i class="bi bi-chevron-left fw-bold"></i>
                    </button>
                    <button id="btnContinuar" class="btn btn-primary w-100 d-flex justify-content-between align-items-center py-2 rounded-3">
                        <span class="fw-semibold">Continuar</span>
                        <i class="bi bi-chevron-right "></i>
                    </button>
                </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Scripts -->
    <script src="../js/participantes.js"></script>
    <script src="../js/main.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
