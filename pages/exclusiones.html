<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">
        <div class="text-center mb-1">
            <img src="../assets/img/regalos.png" alt="Regalos" class="img-fluid" style="max-height: 150px;">
        </div>
        <div class="card card-elevated border-0 rounded-4 shadow-sm">
            <div class="card-body p-4">
                <div id="seccionPregunta">
                    <h5 class="fw-bold mb-2 fs-6">¿Quieres excluir ciertos sorteos?</h5>
                    <p class="text-muted small mb-4">Usa exclusiones para evitar que ciertas personas saquen nombres específicos.</p>
                    
                    <div class="d-grid gap-2 mb-4">
                        <button id="btnNoExclusiones" class="btn btn-outline-primary py-2 text-start">
                            No establecer exclusiones
                        </button>
                        <button id="btnSiExclusiones" class="btn btn-outline-primary py-2 text-start">
                            Establecer exclusiones
                        </button>
                    </div>
                </div>
                <div id="seccionListaExclusiones" class="hidden">
                    <h5 class="fw-bold mb-3 fs-6">Establecer exclusiones</h5>
                    <div id="contenedorParticipantes" style="max-height: 400px; overflow-y: auto;" class="mb-4">
                        </div>
                </div>
                <div class="d-flex gap-2">
                    <button id="btnRegresar" class="btn border-0 bg-secondary bg-opacity-10 text-primary rounded-3 px-3 d-flex align-items-center justify-content-center">
                        <i class="bi bi-chevron-left fw-bold"></i>
                    </button>
                    <button id="btnContinuar" class="btn btn-primary w-100 d-flex justify-content-between align-items-center py-2 rounded-3">
                        <span class="fw-semibold">Continuar</span>
                        <i class="bi bi-chevron-right "></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Scripts -->
    <script src="../js/exclusiones.js"></script>
    <script src="../js/main.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
