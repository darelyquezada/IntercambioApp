<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Icons de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">
        <div class="text-center mb-1">
            <img src="../assets/img/regalos.png" alt="Regalos" class="img-fluid" style="max-height: 150px;">
        </div>
        <div class="card border-0 shadow-sm rounded-4 position-relative z-1">
            <div class="card-body p-4">
                <h5 class="card-title fw-bold mb-4 fs-6 text-dark">Presupuesto</h5>
                <div id="contenedor-botones" class="row g-2 mb-4">
                    <div class="col-6">
                        <button type="button"
                            class="btn-precio btn w-100 border-0 bg-secondary bg-opacity-10 text-primary fw-bold rounded-3 py-2 fs-6">$500</button>
                    </div>
                    <div class="col-6">
                        <button type="button"
                            class="btn-precio btn w-100 border-0 bg-secondary bg-opacity-10 text-primary fw-bold rounded-3 py-2 fs-6">$200</button>
                    </div>
                    <div class="col-6">
                        <button type="button"
                            class="btn-precio btn w-100 border-0 bg-secondary bg-opacity-10 text-primary fw-bold rounded-3 py-2 fs-6">$300</button>
                    </div>
                    <div class="col-6">
                        <button type="button"
                            class="btn-precio btn w-100 border-0 bg-secondary bg-opacity-10 text-primary fw-bold rounded-3 py-2 fs-6">$150</button>
                    </div>
                    <div class="col-6">
                        <button type="button"
                            class="btn-precio btn w-100 border-0 bg-secondary bg-opacity-10 text-primary fw-bold rounded-3 py-2 fs-6">$100</button>
                    </div>
                    <div class="col-6">
                        <button type="button" id="btn-otro"
                            class="btn-precio btn w-100 border border-primary bg-primary bg-opacity-10 text-primary fw-bold rounded-3 py-2 fs-6 d-flex justify-content-center align-items-center gap-2">
                            Otro <i class="bi bi-pencil-fill small"></i>
                        </button>
                    </div>
                </div>
                <div id="seccion-presupuesto" class="mb-4">
                    <label class="form-label fw-bold fs-6 text-dark mb-2">Presupuesto:</label>
                    <div class="position-relative">
                        <input type="text" id="input-presupuesto"  class="form-control border-primary rounded-3 py-2"
                            placeholder="Introduce el presupuesto">
                        <i class="bi bi-x text-secondary position-absolute top-50 end-0 translate-middle-y me-3 fs-5"
                            role="button" id="btn-limpiar"></i>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button id="btnRegresar" class="btn border-0 bg-secondary bg-opacity-10 text-primary rounded-3 px-3 d-flex align-items-center justify-content-center">
                        <i class="bi bi-chevron-left fw-bold"></i>
                    </button>
                    <button id="btnContinuar" class="btn btn-primary w-100 d-flex justify-content-between align-items-center py-2 rounded-3">
                        <span class="fw-semibold">Continuar</span>
                        <i class="bi bi-chevron-right "></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

        <!-- Custom JS-->
        <script src="../js/presupuesto.js"></script>
        <script src="../js/main.js"></script>
</body>

</html>
