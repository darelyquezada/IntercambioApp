<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">

        <div class="text-center mb-1">
            <img src="" alt="Regalos"
                class="img-fluid" style="max-height: 80px;">
        </div>
        
        <div class="card card-elevated border-0 rounded-4 position-relative z-1">
            <div class="card-body p-4">

                <h5 class="card-title fw-bold mb-3 fs-6">¿Cuál es tu nombre?</h5>

                <div class="position-relative mb-3">
                    <input type="text" class="form-control rounded-3 pe-5 py-2" placeholder="Introduce tu nombre">
                    <i class="bi bi-x text-secondary position-absolute top-50 end-0 translate-middle-y me-3 fs-5"
                        role="button"></i>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="sorteoCheck" checked>
                    <label class="form-check-label text-secondary small" for="sorteoCheck">
                        Inclúyeme (el organizador) en el sorteo
                    </label>
                </div>

                <button class="btn btn-primary w-100 d-flex justify-content-between align-items-center py-2 rounded-3">
                    <span class="fw-semibold">Continuar</span>
                    <i class="bi bi-chevron-right"></i>
                </button>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
