<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">

    <header class="min-vh-100 d-flex flex-column justify-content-center align-items-center position-relative bg-white">

        <div class="text-center px-3 ">
            <div class="bg-primary rounded-4 d-inline-block mb-4 shadow-sm">
            <img src="assets/img/logo.png" alt="Logotipo"
                class="img-fluid" id="logo">
            </div>
            <h1 class="display-3 fw-bold text-dark mb-3">Sorteo Mágico</h1>
            <p class="lead text-secondary mb-5">Organiza tus intercambios de regalos de forma fácil y divertida.</p>

            <button class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-bold shadow" id="comenzar">
                Comenzar sorteo <i class="bi bi-magic ms-2"></i>
            </button>
        </div>

        <div class="position-absolute bottom-0 mb-4 text-center">
            <span class="text-secondary small fw-semibold d-block mb-1">Descubre más</span>
            <i class="bi bi-chevron-down text-primary fs-3"></i>
        </div>
    </header>


    <section id="presentacion" class="min-vh-100 d-flex align-items-center py-5">

        <div class="container fade" id="contenido-oculto">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8 text-center">

                    <h2 class="display-5 fw-bold text-dark mb-4">La forma más justa de celebrar</h2>
                    <p class="fs-5 text-secondary mb-5">
                        Olvídate de los papelitos en un sombrero. Nuestra plataforma automatiza el proceso, asegura que
                        nadie se saque a sí mismo y mantiene la sorpresa hasta el final.
                    </p>

                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
